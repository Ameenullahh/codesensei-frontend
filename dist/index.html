    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5), 0 0 20px rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        .glass-card {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter: blur(24px);
        }
        .glass-panel {
            background: rgba(28, 27, 27, 0.6);
            backdrop-filter: blur(24px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
        @keyframes card-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-card-bounce {
            animation: card-bounce 1s ease-in-out infinite;
        }
        .code-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(168, 85, 247, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* Ripple Animation */
        @keyframes ripple-anim {
            to { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        .animate-ripple {
            animation: ripple-anim 0.6s linear;
        }

        /* Nav Sweep Animation */
        .nav-glow-sweep {
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .nav-glow-sweep::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.2), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }
        .nav-glow-sweep:hover::before {
            left: 100%;
        }

        /* Glow Pulse Animation */
        @keyframes glow-pulse {
            0% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
            50% { box-shadow: 0 0 35px rgba(168, 85, 247, 0.8), 0 0 60px rgba(168, 85, 247, 0.4); }
            100% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        }
        .pulse-glow {
            animation: glow-pulse 2s infinite ease-in-out;
        }

        /* Page Transitions */
        @keyframes flip-out {
            from { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
            to { transform: perspective(1200px) rotateY(90deg); opacity: 0; }
        }
        .animate-flip-out {
            animation: flip-out 0.2s ease-in forwards;
        }

        @keyframes flip-in {
            from { transform: perspective(1200px) rotateY(-90deg); opacity: 0; }
            to { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
        }
        .animate-flip-in {
            animation: flip-in 0.2s ease-out forwards;
        }

        @keyframes purple-flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; background-color: rgba(168, 85, 247, 0.8); }
        }
        .animate-purple-flash {
            animation: purple-flash 0.1s ease-in-out forwards;
        }

        @keyframes initial-load {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-initial-load {
            animation: initial-load 0.6s ease-out forwards;
        }

        /* Glitch Animation for Title */
        @keyframes text-glitch {
            0%, 96% { transform: translate(0); text-shadow: none; opacity: 1; }
            97% { transform: translate(-3px, 1px) skewX(-10deg); text-shadow: 2px 0 #a855f7, -2px 0 white; opacity: 0.8; }
            98% { transform: translate(3px, -2px) skewX(10deg); text-shadow: -2px 0 #a855f7, 2px 0 white; opacity: 0.9; }
            99% { transform: translate(-1px, 2px) skewX(-5deg); text-shadow: 2px 0 #a855f7, -2px 0 white; opacity: 0.8; }
            100% { transform: translate(0); text-shadow: none; opacity: 1; }
        }
        .animate-text-glitch {
            animation: text-glitch 4s infinite linear;
        }
    </style>
    <script type="module" crossorigin src="/assets/index-DHEl7GJH.js"></script>
